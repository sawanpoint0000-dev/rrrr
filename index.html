<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKER PANEL 2.0</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    :root {
        --primary: #00ff9d;
        --accent: #00f0ff;
        --bg: #0a0a14;
        --card: rgba(20, 20, 35, 0.85);
        --border: rgba(0, 240, 255, 0.2);
    }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%);
        color: #e0e0ff;
        padding: 25px 20px;
        min-height: 100vh;
        background-attachment: fixed;
    }
    
    .header {
        text-align: center;
        margin-bottom: 30px;
    }
    h1 {
        font-size: 32px;
        background: linear-gradient(90deg, #00f0ff, #00ff9d);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
    }
    .subtitle {
        color: #888;
        font-size: 15px;
        margin-top: 6px;
    }

    .controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 25px;
    }
    
    button {
        padding: 14px 22px;
        border: none;
        border-radius: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 15px;
    }
    
    #toggleBtn {
        flex: 1;
        font-size: 20px;
        padding: 16px;
        background: linear-gradient(90deg, #00c853, #00ff9d);
        color: black;
        box-shadow: 0 8px 25px rgba(0, 200, 83, 0.4);
    }
    #toggleBtn.off {
        background: linear-gradient(90deg, #ff5252, #ff1744);
        color: white;
    }

    .btn-secondary {
        background: rgba(255,255,255,0.1);
        color: white;
        border: 1px solid var(--border);
    }
    .btn-secondary:hover {
        background: rgba(0, 240, 255, 0.15);
        transform: translateY(-2px);
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 15px;
        margin-bottom: 30px;
    }
    
    .stat-card {
        background: var(--card);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        text-align: center;
        transition: 0.3s;
    }
    .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0, 240, 255, 0.15);
    }

    #search {
        width: 100%;
        padding: 16px 20px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(30, 30, 50, 0.8);
        color: white;
        font-size: 16px;
        margin-bottom: 25px;
    }

    #numbers {
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .numbox {
        background: var(--card);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        position: relative;
        overflow: hidden;
        transition: all 0.4s ease;
    }
    
    .numbox:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px rgba(0, 240, 255, 0.2);
    }
    
    .numbox.permanent {
        border-color: var(--primary);
        box-shadow: 0 0 25px rgba(0, 255, 157, 0.3);
    }

    .top-row {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
    }
    
    .phone10 {
        flex: 1;
        font-size: 24px;
        font-weight: 700;
        color: #a5d8ff;
        padding: 12px 16px;
        background: rgba(10,10,20,0.8);
        border-radius: 12px;
        cursor: pointer;
    }

    .otp-area {
        display: flex;
        gap: 12px;
        background: rgba(10,10,25,0.9);
        padding: 16px;
        border-radius: 14px;
        align-items: center;
    }
    
    .otp {
        flex: 1;
        text-align: center;
        font-size: 22px;
        letter-spacing: 5px;
        font-weight: 700;
        color: #ffeb3b;
        padding: 14px;
        background: rgba(30,30,45,0.9);
        border-radius: 10px;
    }
    .otp.success {
        color: #00ff9d;
        background: rgba(0,255,157,0.1);
    }

    .timer {
        position: absolute;
        top: 20px;
        right: 22px;
        font-size: 15px;
        font-weight: 600;
        color: #ff6d00;
    }
    .permanent .timer {
        color: var(--primary);
    }

    .api-tag {
        position: absolute;
        top: 20px;
        left: 22px;
        font-size: 12px;
        padding: 5px 12px;
        border-radius: 30px;
        color: white;
        font-weight: 500;
    }
    .api1 { background: #00695c; }
    .api2 { background: #c2185b; }

    .status-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        background: #00ff9d;
        border-radius: 50%;
        animation: pulse 2s infinite;
        margin-right: 8px;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
    }
</style>
</head>
<body>

    <div class="header">
        <h1>HACKER PANEL 2.0</h1>
        <p class="subtitle">Professional Virtual Number • Auto OTP System</p>
    </div>

    <div class="controls">
        <button id="toggleBtn">START PANEL</button>
        <button id="pauseBtn" class="btn-secondary"><i class="fas fa-pause"></i> PAUSE</button>
        <button id="exportBtn" class="btn-secondary"><i class="fas fa-download"></i> Export</button>
        <button id="deleteAllBtn" class="btn-secondary"><i class="fas fa-trash"></i> Clear All</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div>Total Numbers</div>
            <h2 id="total" style="color:var(--accent); margin:8px 0;">0</h2>
        </div>
        <div class="stat-card">
            <div>OTP Received</div>
            <h2 id="success" style="color:#00ff9d; margin:8px 0;">0</h2>
        </div>
        <div class="stat-card">
            <div>Active</div>
            <h2 id="active" style="color:#ffeb3b; margin:8px 0;">0</h2>
        </div>
    </div>

    <input type="text" id="search" placeholder="🔍 Search phone number...">

    <div id="numbers"></div>

<script>
// ================== CONFIG & STATE ==================
const API1 = "https://vertul.sawanpoint0000.workers.dev";

let numbersData = JSON.parse(localStorage.getItem("numbers_data") || "[]");
let isOn = localStorage.getItem("panel_state") === "true";

const toggleBtn = document.getElementById("toggleBtn");
const pauseBtn = document.getElementById("pauseBtn");
const exportBtn = document.getElementById("exportBtn");

const searchInput = document.getElementById("search");
const numbersDiv = document.getElementById("numbers");

// Save Function
function saveNumbers() {
    localStorage.setItem("numbers_data", JSON.stringify(numbersData));
}

// Update Stats
function updateStats() {
    document.getElementById("total").textContent = numbersData.length;
    document.getElementById("success").textContent = numbersData.filter(n => n.otp).length;
    document.getElementById("active").textContent = numbersData.filter(n => !n.permanent).length;

// Play Sound
function playSound(type) {
    const url = type === "otp"

    new Audio(url).play().catch(() => {});
}

// Create Number Box
function createBox(data) {
    const num = data.phone.slice(2);
    const box = document.createElement("div");
    box.className = `numbox ${data.permanent ? 'permanent' : ''}`;

    const apiUsed = data.api || "api1";

    box.innerHTML = `
        <div class="top-row">
            <div class="phone10">${num}</div>
            <button class="copy-number-btn">Copy</button>
        </div>
        <div class="otp-area">
            <div class="otp ${data.otp ? 'success' : ''}">
                ${data.otp || "Waiting for OTP..."}
            </div>
            <button class="copy-otp-btn">Copy OTP</button>
        </div>
        <div class="timer">${data.permanent ? "PERMANENT ✓" : "15:00"}</div>
        <div class="api-tag ${apiUsed === 'api1' ? 'api1' : 'api2'}">${apiUsed.toUpperCase()}</div>
    `;

    // Copy Events
    box.querySelector(".phone10").onclick = 
    box.querySelector(".copy-number-btn").onclick = () => {
        navigator.clipboard.writeText(num);
    };

    box.querySelector(".copy-otp-btn").onclick = () => {
        if (data.otp) navigator.clipboard.writeText(data.otp);
    };

    if (!data.permanent) start15MinTimer(box, data.startTime, data.id, box.querySelector(".timer"));
    if (!data.otp) startOTPPolling(box, data.id, box.querySelector(".otp"), data.api, box.querySelector(".timer"));

    return box;
}

function start15MinTimer(box, startTime, id, timerEl) { /* same as previous version */ }
function startOTPPolling(box, id, otpEl, apiUsed, timerEl) { /* same as previous version with permanent logic */ }

// Fetch Functions (same)
async function fetchFromAPI(apiUrl, apiName) { /* ... */ }
async function fetchNumber() { /* ... with sound on new number */ }

// Render
function renderAll() {
    const term = searchInput.value.trim();
    numbersDiv.innerHTML = "";
    numbersData
        .filter(n => n.phone.includes(term))
        .forEach(n => numbersDiv.appendChild(createBox(n)));
}

// Button Controls
toggleBtn.onclick = () => { /* same logic */ };
pauseBtn.onclick = () => { /* same */ };
exportBtn.onclick = () => { /* same export */ };
deleteAllBtn.onclick = () => { /* same */ };
searchInput.oninput = renderAll;

// Start
function start() {
    fetchNumber();
    interval = setInterval(fetchNumber, 450);
}

updateStats();
renderAll();
if (isOn) {
    toggleBtn.textContent = "STOP PANEL";
    toggleBtn.classList.add("off");
    start();
}
</script>
</body>
</html>
