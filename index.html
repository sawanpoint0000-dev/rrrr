<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKER PANEL 2.0</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    :root {
        --primary: #00ff9d;
        --accent: #00f0ff;
        --bg: #0a0a14;
        --card: rgba(20, 20, 35, 0.9);
        --border: rgba(0, 240, 255, 0.2);
    }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%);
        color: #e0e0ff;
        padding: 25px 20px;
        min-height: 100vh;
    }
    
    .header { text-align: center; margin-bottom: 30px; }
    h1 {
        font-size: 32px;
        background: linear-gradient(90deg, #00f0ff, #00ff9d);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #888; font-size: 15px; }

    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 25px; }
    
    button {
        padding: 14px 22px;
        border: none;
        border-radius: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
    }
    
    #toggleBtn {
        flex: 1;
        font-size: 20px;
        padding: 16px;
        background: linear-gradient(90deg, #00c853, #00ff9d);
        color: black;
    }
    #toggleBtn.off {
        background: linear-gradient(90deg, #ff5252, #ff1744);
        color: white;
    }

    .btn-secondary {
        background: rgba(255,255,255,0.1);
        color: white;
        border: 1px solid var(--border);
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 15px;
        margin-bottom: 30px;
    }
    .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        text-align: center;
    }

    #search {
        width: 100%;
        padding: 16px 20px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(30, 30, 50, 0.8);
        color: white;
        font-size: 16px;
        margin-bottom: 25px;
    }

    #numbers { display: flex; flex-direction: column; gap: 18px; }

    .numbox {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        position: relative;
    }
    .numbox.permanent { border-color: var(--primary); }

    .phone10 {
        font-size: 24px;
        font-weight: 700;
        color: #a5d8ff;
        padding: 12px 16px;
        background: rgba(10,10,20,0.8);
        border-radius: 12px;
        cursor: pointer;
    }

    .otp-area {
        display: flex;
        gap: 12px;
        background: rgba(10,10,25,0.9);
        padding: 16px;
        border-radius: 14px;
        align-items: center;
    }
    .otp {
        flex: 1;
        text-align: center;
        font-size: 22px;
        letter-spacing: 5px;
        font-weight: 700;
        color: #ffeb3b;
        padding: 14px;
        background: rgba(30,30,45,0.9);
        border-radius: 10px;
    }
    .otp.success { color: #00ff9d; }

    .timer { position: absolute; top: 20px; right: 22px; font-size: 15px; font-weight: 600; color: #ff6d00; }
    .permanent .timer { color: var(--primary); }

    .api-tag {
        position: absolute;
        top: 20px;
        left: 22px;
        font-size: 12px;
        padding: 5px 12px;
        border-radius: 30px;
        color: white;
    }
    .status-log {
        background: #1a1a2e;
        padding: 12px;
        border-radius: 10px;
        font-size: 13px;
        margin-top: 15px;
        max-height: 150px;
        overflow-y: auto;
    }
</style>
</head>
<body>

    <div class="header">
        <h1>HACKER PANEL 2.0</h1>
        <p class="subtitle">Global Sync • Professional System</p>
    </div>

    <div class="controls">
        <button id="toggleBtn">START PANEL</button>
        <button id="pauseBtn" class="btn-secondary">PAUSE</button>
        <button id="exportBtn" class="btn-secondary">Export</button>
        <button id="deleteAllBtn" class="btn-secondary">Delete All</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div>Total</div>
            <h2 id="total" style="color:#00f0ff;">0</h2>
        </div>
        <div class="stat-card">
            <div>OTP</div>
            <h2 id="success" style="color:#00ff9d;">0</h2>
        </div>
        <div class="stat-card">
            <div>Active</div>
            <h2 id="active" style="color:#ffeb3b;">0</h2>
        </div>
    </div>

    <input type="text" id="search" placeholder="🔍 Search number...">

    <div id="numbers"></div>

    <div class="status-log" id="log">Waiting for panel to start...</div>

<script>
// ================== CONFIG ==================
const API1 = "https://vertul.sawanpoint0000.workers.dev";
const API2 = "https://vertul.sawanenter7209.workers.dev/";

const SERVICE = "swr";
const COUNTRY = "22";
const MAX_PRICE = "80";

// ================== STATE ==================
let numbersData = JSON.parse(localStorage.getItem("numbers_data") || "[]");
let isOn = localStorage.getItem("panel_state") === "true";
let isPaused = false;
let interval = null;

const toggleBtn = document.getElementById("toggleBtn");
const logDiv = document.getElementById("log");

// Log Function
function addLog(message, type = "info") {
    const time = new Date().toLocaleTimeString();
    logDiv.innerHTML += `<br>[${time}] <span style="color:${type==='error'?'#ff5252':type==='success'?'#00ff9d':'#00f0ff'}">${message}</span>`;
    logDiv.scrollTop = logDiv.scrollHeight;
}

// Global Sync
window.addEventListener('storage', (e) => {
    if (e.key === "panel_state") {
        location.reload();
    }
});

// Save & Stats
function saveNumbers() { localStorage.setItem("numbers_data", JSON.stringify(numbersData)); }
function updateStats() {
    document.getElementById("total").textContent = numbersData.length;
    document.getElementById("success").textContent = numbersData.filter(n => n.otp).length;
    document.getElementById("active").textContent = numbersData.filter(n => !n.permanent).length;
}

// Create Box (simplified)
function createBox(data) {
    const num = data.phone ? data.phone.slice(2) : "Unknown";
    const box = document.createElement("div");
    box.className = `numbox ${data.permanent ? 'permanent' : ''}`;
    box.innerHTML = `
        <div style="display:flex; gap:15px; align-items:center; margin-bottom:12px;">
            <div class="phone10">${num}</div>
            <button>Copy</button>
        </div>
        <div class="otp-area">
            <div class="otp ${data.otp ? 'success' : ''}">${data.otp || "Waiting..."}</div>
            <button>Copy OTP</button>
        </div>
        <div class="timer">${data.permanent ? "PERMANENT" : "15:00"}</div>
    `;
    return box;
}

async function fetchNumber() {
    if (!isOn || isPaused) return;

    addLog("Trying to fetch number...");

    try {
        // Try API1
        let res = await fetch(API1 + `?action=getNumber&service=${SERVICE}&country=${COUNTRY}&maxPrice=${MAX_PRICE}`);
        let text = await res.text();
        addLog("API1 Response: " + text.substring(0, 100), "info");

        if (text.startsWith("ACCESS_NUMBER")) {
            const [, id, phone] = text.split(":");
            const newItem = { id, phone, otp: null, startTime: Date.now(), api: "api1", permanent: false };
            numbersData.unshift(newItem);
            saveNumbers();
            document.getElementById("numbers").prepend(createBox(newItem));
            updateStats();
            addLog("✅ New Number Received!", "success");
            return;
        }

        // Try API2
        res = await fetch(API2 + `?action=getNumber&service=${SERVICE}&country=${COUNTRY}&maxPrice=${MAX_PRICE}`);
        text = await res.text();
        addLog("API2 Response: " + text.substring(0, 100), "info");

        if (text.startsWith("ACCESS_NUMBER")) {
            const [, id, phone] = text.split(":");
            const newItem = { id, phone, otp: null, startTime: Date.now(), api: "api2", permanent: false };
            numbersData.unshift(newItem);
            saveNumbers();
            document.getElementById("numbers").prepend(createBox(newItem));
            updateStats();
            addLog("✅ New Number Received from API2!", "success");
        } else {
            addLog("No number available right now", "info");
        }
    } catch (e) {
        addLog("Error: " + e.message, "error");
    }
}

// Button Controls
toggleBtn.onclick = () => {
    isOn = !isOn;
    localStorage.setItem("panel_state", isOn);
    toggleBtn.textContent = isOn ? "STOP PANEL" : "START PANEL";
    toggleBtn.classList.toggle("off", !isOn);

    if (isOn) {
        addLog("Panel Started");
        interval = setInterval(fetchNumber, 800);
        fetchNumber();
    } else {
        addLog("Panel Stopped");
        clearInterval(interval);
    }
};

// Other buttons (export, delete, etc.)
document.getElementById("exportBtn").onclick = () => {
    let text = "Number\tOTP\n";
    numbersData.forEach(n => text += `${n.phone}\t${n.otp||""}\n`);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([text]));
    a.download = "numbers.txt";
    a.click();
};

document.getElementById("deleteAllBtn").onclick = () => {
    if (confirm("Delete All?")) {
        numbersData = [];
        saveNumbers();
        document.getElementById("numbers").innerHTML = "";
        updateStats();
    }
};

// Init
updateStats();
if (isOn) {
    toggleBtn.textContent = "STOP PANEL";
    toggleBtn.classList.add("off");
    interval = setInterval(fetchNumber, 800);
    fetchNumber();
} else {
    toggleBtn.textContent = "START PANEL";
}
</script>
</body>
</html>
