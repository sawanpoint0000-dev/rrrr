<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKER PANEL 2.0</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    :root {
        --primary: #00ff9d;
        --accent: #00f0ff;
        --bg: #0a0a14;
        --card: rgba(20, 20, 35, 0.9);
        --border: rgba(0, 240, 255, 0.2);
    }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%);
        color: #e0e0ff;
        padding: 25px 20px;
        min-height: 100vh;
    }
    
    .header { text-align: center; margin-bottom: 30px; }
    h1 {
        font-size: 32px;
        background: linear-gradient(90deg, #00f0ff, #00ff9d);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #888; font-size: 15px; }

    .controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 25px;
    }
    
    button {
        padding: 14px 22px;
        border: none;
        border-radius: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
    }
    
    #toggleBtn {
        flex: 1;
        font-size: 20px;
        padding: 16px;
        background: linear-gradient(90deg, #00c853, #00ff9d);
        color: black;
    }
    #toggleBtn.off {
        background: linear-gradient(90deg, #ff5252, #ff1744);
        color: white;
    }

    .btn-secondary {
        background: rgba(255,255,255,0.1);
        color: white;
        border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: rgba(0, 240, 255, 0.2); }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 15px;
        margin-bottom: 30px;
    }
    .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        text-align: center;
    }

    #search {
        width: 100%;
        padding: 16px 20px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(30, 30, 50, 0.8);
        color: white;
        font-size: 16px;
        margin-bottom: 25px;
    }

    #numbers { display: flex; flex-direction: column; gap: 18px; }

    .numbox {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        position: relative;
        transition: all 0.4s;
    }
    .numbox:hover { transform: translateY(-4px); }
    .numbox.permanent { border-color: var(--primary); box-shadow: 0 0 25px rgba(0,255,157,0.3); }

    .top-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .phone10 {
        flex: 1;
        font-size: 24px;
        font-weight: 700;
        color: #a5d8ff;
        padding: 12px 16px;
        background: rgba(10,10,20,0.8);
        border-radius: 12px;
        cursor: pointer;
    }

    .otp-area {
        display: flex;
        gap: 12px;
        background: rgba(10,10,25,0.9);
        padding: 16px;
        border-radius: 14px;
        align-items: center;
    }
    .otp {
        flex: 1;
        text-align: center;
        font-size: 22px;
        letter-spacing: 5px;
        font-weight: 700;
        color: #ffeb3b;
        padding: 14px;
        background: rgba(30,30,45,0.9);
        border-radius: 10px;
    }
    .otp.success { color: #00ff9d; background: rgba(0,255,157,0.1); }

    .timer {
        position: absolute;
        top: 20px;
        right: 22px;
        font-size: 15px;
        font-weight: 600;
        color: #ff6d00;
    }
    .permanent .timer { color: var(--primary); }

    .api-tag {
        position: absolute;
        top: 20px;
        left: 22px;
        font-size: 12px;
        padding: 5px 12px;
        border-radius: 30px;
        color: white;
    }
    .api1 { background: #00695c; }
    .api2 { background: #c2185b; }
</style>
</head>
<body>

    <div class="header">
        <h1>HACKER PANEL 2.0</h1>
        <p class="subtitle">Professional Virtual Number + Auto OTP System</p>
    </div>

    <div class="controls">
        <button id="toggleBtn">START PANEL</button>
        <button id="pauseBtn" class="btn-secondary">PAUSE</button>
        <button id="exportBtn" class="btn-secondary">Export TXT</button>
        <button id="deleteAllBtn" class="btn-secondary">Delete All</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div>Total Numbers</div>
            <h2 id="total" style="color:#00f0ff;">0</h2>
        </div>
        <div class="stat-card">
            <div>OTP Received</div>
            <h2 id="success" style="color:#00ff9d;">0</h2>
        </div>
        <div class="stat-card">
            <div>Active</div>
            <h2 id="active" style="color:#ffeb3b;">0</h2>
        </div>
    </div>

    <input type="text" id="search" placeholder="🔍 Search phone number...">

    <div id="numbers"></div>

<script>
// ================== CONFIG ==================
const API1 = "https://vertul.sawanpoint0000.workers.dev";
const API2 = "https://vertul.sawanenter7209.workers.dev/";
const SERVICE = "swr";
const COUNTRY = "22";
const MAX_PRICE = "80";

// ================== STATE ==================
let numbersData = JSON.parse(localStorage.getItem("numbers_data") || "[]");
let isOn = localStorage.getItem("panel_state") === "true";
let isPaused = false;
let interval = null;
let requestRunning = false;

const toggleBtn = document.getElementById("toggleBtn");
const pauseBtn = document.getElementById("pauseBtn");
const exportBtn = document.getElementById("exportBtn");
const deleteAllBtn = document.getElementById("deleteAllBtn");
const searchInput = document.getElementById("search");
const numbersDiv = document.getElementById("numbers");

// ================== SAVE & STATS ==================
function saveNumbers() {
    localStorage.setItem("numbers_data", JSON.stringify(numbersData));
}

function updateStats() {
    document.getElementById("total").textContent = numbersData.length;
    document.getElementById("success").textContent = numbersData.filter(n => n.otp).length;
    document.getElementById("active").textContent = numbersData.filter(n => !n.permanent).length;
}

// ================== SOUND ==================
function playSound(type) {
    const url = type === "otp" 
        ? "https://freesound.org/data/previews/387/387186_7258994-lq.mp3"
        : "https://freesound.org/data/previews/66/66929_931655-lq.mp3";
    new Audio(url).play().catch(()=>{});
}

// ================== CREATE BOX ==================
function createBox(data) {
    const num = data.phone.slice(2);
    const box = document.createElement("div");
    box.className = `numbox ${data.permanent ? 'permanent' : ''}`;

    const apiUsed = data.api || "api1";

    box.innerHTML = `
        <div class="top-row">
            <div class="phone10">${num}</div>
            <button class="copy-number-btn">Copy</button>
        </div>
        <div class="otp-area">
            <div class="otp ${data.otp ? 'success' : ''}">
                ${data.otp || "Waiting for OTP..."}
            </div>
            <button class="copy-otp-btn">Copy OTP</button>
        </div>
        <div class="timer">${data.permanent ? "PERMANENT ✓" : "15:00"}</div>
        <div class="api-tag ${apiUsed === 'api1' ? 'api1' : 'api2'}">${apiUsed.toUpperCase()}</div>
    `;

    const phoneEl = box.querySelector(".phone10");
    const copyNumBtn = box.querySelector(".copy-number-btn");
    const copyOtpBtn = box.querySelector(".copy-otp-btn");
    const otpEl = box.querySelector(".otp");
    const timerEl = box.querySelector(".timer");

    const copyNumber = () => navigator.clipboard.writeText(num);
    phoneEl.onclick = copyNumBtn.onclick = copyNumber;
    copyOtpBtn.onclick = () => { if (data.otp) navigator.clipboard.writeText(data.otp); };

    if (!data.permanent) start15MinTimer(box, data.startTime, data.id, timerEl);
    if (!data.otp) startOTPPolling(box, data.id, otpEl, data.api, timerEl);

    return box;
}

// ================== TIMER ==================
function start15MinTimer(box, startTime, id, timerEl) {
    const start = startTime || Date.now();
    const t = setInterval(() => {
        const elapsed = Math.floor((Date.now() - start) / 1000);
        let remain = 900 - elapsed;

        if (remain <= 0) {
            clearInterval(t);
            if (!numbersData.find(x => x.id === id)?.permanent) {
                box.remove();
                numbersData = numbersData.filter(x => x.id !== id);
                saveNumbers();
                updateStats();
            }
            return;
        }

        const m = String(Math.floor(remain / 60)).padStart(2, "0");
        const s = String(remain % 60).padStart(2, "0");
        timerEl.textContent = `${m}:${s}`;
    }, 1000);
}

// ================== OTP POLLING ==================
function startOTPPolling(box, id, otpEl, apiUsed, timerEl) {
    const apiUrl = apiUsed === "api2" ? API2 : API1;
    const poll = setInterval(async () => {
        try {
            const q = new URLSearchParams({ action: "getStatus", id });
            const r = await fetch(apiUrl + "?" + q);
            const t = (await r.text()).trim();

            if (t.startsWith("STATUS_OK")) {
                const code = t.split(":")[1];
                otpEl.textContent = code;
                otpEl.classList.add("success");
                navigator.clipboard.writeText(code);
                playSound("otp");

                const item = numbersData.find(x => x.id === id);
                if (item) {
                    item.otp = code;
                    item.permanent = true;
                    saveNumbers();
                }

                if (box.longTimer) clearInterval(box.longTimer);
                timerEl.textContent = "PERMANENT ✓";
                box.classList.add("permanent");
                updateStats();
                clearInterval(poll);
            }
        } catch (e) {}
    }, 2000);
}

// ================== FETCH NUMBER ==================
async function fetchFromAPI(apiUrl, apiName) {
    try {
        const params = new URLSearchParams({
            action: "getNumber",
            service: SERVICE,
            country: COUNTRY,
            maxPrice: MAX_PRICE
        });
        const res = await fetch(apiUrl + "?" + params);
        const text = (await res.text()).trim();

        if (text.startsWith("ACCESS_NUMBER")) {
            const [, id, phone] = text.split(":");
            if (numbersData.some(x => x.id === id)) return null;
            return { id, phone, otp: null, startTime: Date.now(), api: apiName, permanent: false };
        }
    } catch (e) {}
    return null;
}

async function fetchNumber() {
    if (!isOn || isPaused || requestRunning) return;
    requestRunning = true;

    let item = await fetchFromAPI(API1, "api1");
    if (!item) item = await fetchFromAPI(API2, "api2");

    if (item) {
        numbersData.unshift(item);
        saveNumbers();
        numbersDiv.prepend(createBox(item));
        playSound("new");
        updateStats();
    }
    requestRunning = false;
}

// ================== RENDER ==================
function renderAll() {
    const term = searchInput.value.trim();
    numbersDiv.innerHTML = "";
    numbersData
        .filter(n => n.phone.includes(term))
        .forEach(n => numbersDiv.appendChild(createBox(n)));
}

// ================== BUTTON CONTROLS ==================
toggleBtn.onclick = () => {
    isOn = !isOn;
    localStorage.setItem("panel_state", isOn);
    toggleBtn.textContent = isOn ? "STOP PANEL" : "START PANEL";
    toggleBtn.classList.toggle("off", !isOn);

    if (isOn) start();
    else clearInterval(interval);
};

pauseBtn.onclick = () => {
    isPaused = !isPaused;
    pauseBtn.textContent = isPaused ? "RESUME" : "PAUSE";
};

exportBtn.onclick = () => {
    let text = "Number\tOTP\tStatus\n";
    numbersData.forEach(n => {
        text += `${n.phone.slice(2)}\t${n.otp || "Pending"}\t${n.permanent ? "Permanent" : "Active"}\n`;
    });
    const blob = new Blob([text], {type: "text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `hacker_panel_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
};

deleteAllBtn.onclick = () => {
    if (confirm("सभी numbers delete कर दें?")) {
        numbersData = [];
        saveNumbers();
        renderAll();
        updateStats();
    }
};

searchInput.oninput = renderAll;

// ================== START FUNCTION ==================
function start() {
    fetchNumber();
    interval = setInterval(fetchNumber, 450);
}

// ================== INIT ==================
updateStats();
renderAll();
if (isOn) {
    toggleBtn.textContent = "STOP PANEL";
    toggleBtn.classList.add("off");
    start();
}
</script>
</body>
</html>
